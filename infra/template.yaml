AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  cloud-resume-challenge

  Sample SAM Template for cloud-resume-challenge


Globals:
  Function:
    Timeout: 3
    MemorySize: 128

Resources:
  # S3 bucket to host the website
  MyWebsite:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-resume-site-phantom
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Policy to allow CloudFront (via OAC) to read from the S3 bucket
  MyWebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyWebsite
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${MyWebsite}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${MyDistribution}'

  # Origin Access Control so CloudFront can sign requests to the private S3 bucket
  MyOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: my-resume-site-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
      
  # CloudFront distribution for the website
  MyDistribution:
    Type: "AWS::CloudFront::Distribution"
    Properties:
      DistributionConfig:
        ViewerCertificate:
         AcmCertificateArn: !Ref MyCertificate
         SslSupportMethod: sni-only
        Aliases:
          - cetienne.cloud
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          TargetOriginId: myS3Origin
          DefaultTTL: 0
          MinTTL: 0
          MaxTTL: 0
          ForwardedValues:
            QueryString: false
        Origins:
          - DomainName: !GetAtt MyWebsite.RegionalDomainName
            Id: myS3Origin
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt MyOAC.Id
        Enabled: true   # Boolean value should not be in quotes
        DefaultRootObject: index.html

  # Route53 record to point to the CloudFront distribution
  MyRoute53Record:
    Type: "AWS::Route53::RecordSetGroup"
    Properties:
      HostedZoneId: "Z00191493U1XET4UA7DAO"
      RecordSets: 
        - Name: cetienne.cloud. 
          Type: A
          AliasTarget:
            DNSName: !GetAtt MyDistribution.DomainName  
            HostedZoneId: "Z2FDTNDATAQYW2" 

  # ACM certificate for the domain
  MyCertificate:
    Type: "AWS::CertificateManager::Certificate"
    Properties:
      DomainName: "cetienne.cloud"
      ValidationMethod: DNS

  # DynamoDB table to store visit counts
  MyDynamoDBTable:
    Type: "AWS::DynamoDB::Table"
    Properties:
      TableName: "cloud-resume-challenge"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: "ID"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "ID"
          KeyType: "HASH"
     
  # Lambda function to handle visit counts
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      Policies:
        - DynamoDBCrudPolicy:
            TableName: "cloud-resume-challenge"
      CodeUri: hello_world/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Events:
        Views:
          Type: Api
          Properties:
            Path: /visits
            Method: post

  # Permissions required for Function URLs (public / no-auth)
  HelloWorldInvokeFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt HelloWorldFunction.Arn
      Action: lambda:InvokeFunction
      Principal: "*"
      

  HelloWorldInvokeFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt HelloWorldFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  # API Gateway endpoint URL for the Lambda function
  HelloWorldApi:
    Description: "API Gateway endpoint URL for Prod stage for Hello World function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/hello/"
  
  # ARN of the Lambda function
  HelloWorldFunction:
    Description: "Hello World Lambda Function ARN"
    Value: !GetAtt HelloWorldFunction.Arn
  
  # IAM Role created for the Lambda function
  HelloWorldFunctionIamRole:
    Description: "Implicit IAM Role created for Hello World function"
    Value: !GetAtt HelloWorldFunctionRole.Arn
